    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="./scripts/library.js"></script>
    <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
    <script type="module">
        import { timeForThemes } from './scripts/theme.js';

        Vue.createApp({
            data() {
                return {
                    tabs: [
                        { title: 'home', url: '/index.html' },
                        { title: 'library', url: '/library.html' },
                        { title: 'music', url: '/music.html' },
                       // { title: 'Ratings', url: '/ratings.html' },
                        /* { title: 'Login', url: '/login' }*/
                    ]
                };
            },
            methods: {
                activating(item) {
                    return window.location.pathname.endsWith(item.url);
                }
            }
        }).mount('#app');



        // spotify player time
        window.onSpotifyIframeApiReady = (IFrameAPI) => {
            const element = document.getElementById('embed-iframe');
            const options = {
                width: '100%',
                height: '80',
                uri: ''
            };

            const callback = (EmbedController) => {
                window.spotifyEmbedController = EmbedController;

                const trackUri = localStorage.getItem('selected_track_uri');
        if (trackUri) {
            EmbedController.loadUri(trackUri);
        }
    };

            IFrameAPI.createController(element, options, callback);
        };

        function setupTrackClickHandlers() {
            document.querySelectorAll('.track-card').forEach(track => {
                track.addEventListener('click', function(wooow) {
                    wooow.preventDefault();
                    const uri = this.dataset.uri;
                    if (uri && window.spotifyEmbedController) {
                        window.spotifyEmbedController.loadUri(uri);
                    }
                });
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.addedNodes.length) {
                        setupTrackClickHandlers();
                    }
                });
            });

            const trackContainer = document.getElementById('albums-track-container');
            if (trackContainer) {
                observer.observe(trackContainer, {
                    childList: true,
                    subtree: true
                });
            }
        });

        timeForThemes();
        </script>
